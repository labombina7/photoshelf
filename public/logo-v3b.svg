<svg viewBox="0 0 96 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- photoshelf · film strip + DOS baldas, 2+2 escalonadas
       Balda superior: TLR (izq) · DSLR (der)
       Balda inferior: Rangefinder · Compacta (centradas entre las de arriba) -->

  <rect width="96" height="68" rx="5" fill="#1a1917"/>

  <!-- Top sprockets -->
  <rect x="7"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Bottom sprockets -->
  <rect x="7"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Image frame -->
  <rect x="7" y="11" width="82" height="46" fill="#f8f7f5"/>

  <!-- Balda superior -->
  <rect x="7" y="35" width="82" height="1.5" fill="#1a1917"/>
  <!-- Balda inferior -->
  <rect x="7" y="50" width="82" height="1.5" fill="#1a1917"/>

  <!-- BALDA SUPERIOR -->

  <!-- TLR izquierda -->
  <rect x="11" y="14" width="11" height="4"  rx="1" fill="#1a1917"/>
  <rect x="12" y="18" width="9"  height="17" rx="1" fill="#1a1917"/>
  <circle cx="16.5" cy="23"   r="2.5" fill="#f8f7f5"/>
  <circle cx="16.5" cy="30.5" r="2.8" fill="#f8f7f5"/>
  <circle cx="16.5" cy="30.5" r="1"   fill="#1a1917" opacity="0.45"/>

  <!-- DSLR derecha -->
  <rect x="70" y="14" width="10" height="5"  rx="1"   fill="#1a1917"/>
  <rect x="66" y="19" width="17" height="16" rx="1"   fill="#1a1917"/>
  <rect x="81" y="22" width="3"  height="10" rx="1.5" fill="#1a1917"/>
  <circle cx="74" cy="27" r="6.5" fill="#f8f7f5"/>
  <circle cx="74" cy="27" r="4"   fill="#1a1917" opacity="0.22"/>
  <circle cx="74" cy="27" r="2.2" fill="#f8f7f5" opacity="0.6"/>
  <circle cx="74" cy="27" r="0.9" fill="#1a1917"/>

  <!-- BALDA INFERIOR — escalonadas -->

  <!-- Rangefinder (entre TLR y DSLR, tirando a la izq) -->
  <rect x="26" y="37"   width="2"  height="2.5" rx="0.5" fill="#1a1917"/>
  <rect x="26" y="39.5" width="22" height="10.5" rx="1" fill="#1a1917"/>
  <circle cx="33" cy="44.8" r="4"   fill="#f8f7f5"/>
  <circle cx="33" cy="44.8" r="2"   fill="#1a1917" opacity="0.4"/>
  <rect x="41.5" y="41" width="3" height="2"   rx="0.5" fill="#f8f7f5"/>
  <rect x="41.5" y="44" width="3" height="2"   rx="0.5" fill="#f8f7f5"/>

  <!-- Compacta (tirando a la der) -->
  <rect x="52" y="41" width="16" height="9" rx="2"   fill="#1a1917"/>
  <circle cx="58" cy="45.5" r="3"   fill="#f8f7f5"/>
  <circle cx="58" cy="45.5" r="1.3" fill="#1a1917" opacity="0.4"/>
  <rect x="63" y="42" width="4" height="3" rx="0.5" fill="#f8f7f5" opacity="0.4"/>
