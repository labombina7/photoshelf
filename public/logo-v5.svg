<svg viewBox="0 0 96 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    photoshelf v5 — contact sheet
    Tira de negativo analógico + grid 4×3 de miniaturas de foto dentro del frame
    Variación tonal → diferentes escenas/exposiciones → colección fotográfica
  -->

  <!-- Film body -->
  <rect width="96" height="68" rx="5" fill="#1a1917"/>

  <!-- Top sprockets (6) -->
  <rect x="7"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Bottom sprockets (6) -->
  <rect x="7"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Image frame (base crema) -->
  <rect x="7" y="11" width="82" height="46" fill="#f8f7f5"/>

  <!-- ══════════════════════════════════════════
       Contact sheet 4 × 3
       Photo: 17 × 12 px · gap: 2 px
       Cols x: 11 · 30 · 49 · 68
       Rows y: 14 · 28 · 42
       Padding: 4 px izq/der · 3 px arr/aba
  ══════════════════════════════════════════ -->

  <!-- Row 1 — tira superior -->
  <rect x="11" y="14" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.78"/>
  <rect x="30" y="14" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.45"/>
  <rect x="49" y="14" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.30"/>
  <rect x="68" y="14" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.85"/>

  <!-- Row 2 — tira central -->
  <rect x="11" y="28" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.25"/>
  <rect x="30" y="28" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.70"/>
  <rect x="49" y="28" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.88"/>
  <rect x="68" y="28" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.40"/>

  <!-- Row 3 — tira inferior -->
  <rect x="11" y="42" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.82"/>
  <rect x="30" y="42" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.55"/>
  <rect x="49" y="42" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.22"/>
  <rect x="68" y="42" width="17" height="12" rx="0.5" fill="#1a1917" opacity="0.68"/>

</svg>
