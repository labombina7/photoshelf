<svg viewBox="0 0 120 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    photoshelf v4 — 120×68 · TLR · Rangefinder · DSLR
    Canvas más ancho para dar masa a cada cámara.
    TLR: cuerpo cuadrado, dos lentes grandes y simétricas.
    Rangefinder: cuerpo muy horizontal, lente cilíndrica.
    DSLR: pentaprisma alto y ancho, lente grande con anillos.
  -->

  <!-- Film body -->
  <rect width="120" height="68" rx="5" fill="#1a1917"/>

  <!-- Top sprockets (7) -->
  <rect x="6"   y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="23"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="40"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="57"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="74"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="91"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="108" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Bottom sprockets (7) -->
  <rect x="6"   y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="23"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="40"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="57"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="74"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="91"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="108" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Image frame -->
  <rect x="6" y="11" width="108" height="46" fill="#f8f7f5"/>

  <!-- Balda -->
  <rect x="6" y="50" width="108" height="2" fill="#1a1917"/>


  <!-- ══════════════════════════════════════════
       TLR · Rolleiflex  (zona x=6–42, centro x=24)
       Cuerpo 18px ancho — casi cuadrado
       Dos lentes r=5 simétricas y prominentes
  ══════════════════════════════════════════ -->
  <!-- Visor waist-level (hood) -->
  <rect x="14" y="20" width="20" height="4" rx="1" fill="#1a1917"/>
  <!-- Cuerpo -->
  <rect x="15" y="24" width="18" height="26" rx="1" fill="#1a1917"/>
  <!-- Lente visor (arriba) -->
  <circle cx="24" cy="30" r="5"   fill="#f8f7f5"/>
  <circle cx="24" cy="30" r="2"   fill="#1a1917" opacity="0.4"/>
  <!-- Lente toma (abajo) -->
  <circle cx="24" cy="42" r="5"   fill="#f8f7f5"/>
  <circle cx="24" cy="42" r="2"   fill="#1a1917" opacity="0.4"/>


  <!-- ══════════════════════════════════════════
       Rangefinder analógica  (zona x=42–78, centro x=60)
       Cuerpo 28×13 — muy horizontal
       Lente cilíndrica izq + ventana visor der
  ══════════════════════════════════════════ -->
  <!-- Lug de correa -->
  <rect x="46" y="33" width="3" height="4" rx="0.5" fill="#1a1917"/>
  <!-- Cuerpo horizontal -->
  <rect x="46" y="37" width="28" height="13" rx="1" fill="#1a1917"/>
  <!-- Lente -->
  <circle cx="55" cy="43.5" r="5"   fill="#f8f7f5"/>
  <circle cx="55" cy="43.5" r="2.2" fill="#1a1917" opacity="0.35"/>
  <!-- Ventana visor -->
  <rect x="66" y="39" width="6" height="3.5" rx="0.5" fill="#f8f7f5"/>


  <!-- ══════════════════════════════════════════
       DSLR  (zona x=78–114, centro x=96)
       Pentaprisma 14×10 — alto y prominente
       Lente r=9 — grande y dominante
       Grip lateral bien definido
  ══════════════════════════════════════════ -->
  <!-- Pentaprisma -->
  <rect x="89" y="15" width="14" height="10" rx="2" fill="#1a1917"/>
  <!-- Cuerpo -->
  <rect x="85" y="25" width="22" height="25" rx="1" fill="#1a1917"/>
  <!-- Grip (derecho) -->
  <rect x="105" y="28" width="4" height="18" rx="2" fill="#1a1917"/>
  <!-- Lente — tres anillos -->
  <circle cx="94" cy="37" r="9"   fill="#f8f7f5"/>
  <circle cx="94" cy="37" r="6.5" fill="#1a1917" opacity="0.15"/>
  <circle cx="94" cy="37" r="4"   fill="#f8f7f5" opacity="0.7"/>
  <circle cx="94" cy="37" r="1.5" fill="#1a1917"/>

</svg>
