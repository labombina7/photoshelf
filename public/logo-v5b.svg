<svg viewBox="0 0 96 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    photoshelf v5b r2 — scattered prints · 8 copias con color
    Procesos fotográficos históricos: b&w · sepia · cianotipia · ámbar
    Capas fondo→frente, sombra suave, clip al frame
  -->

  <!-- Film body -->
  <rect width="96" height="68" rx="5" fill="#1a1917"/>

  <!-- Top sprockets (6) -->
  <rect x="7"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Bottom sprockets (6) -->
  <rect x="7"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Image frame (base crema) -->
  <rect x="7" y="11" width="82" height="46" fill="#f8f7f5"/>

  <defs>
    <clipPath id="frame">
      <rect x="7" y="11" width="82" height="46"/>
    </clipPath>
    <!-- Sombra suave: sensación de copia física levantada -->
    <filter id="ps" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0.4" dy="0.8" stdDeviation="1.0"
                    flood-color="#1a1917" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════════════
       8 copias fotográficas · fondo → frente
       Outer rect = borde blanco del papel (3px h · 2px v)
       Inner rect = imagen: b&w · sepia · cianotipia · ámbar
  ══════════════════════════════════════════════════ -->
  <g clip-path="url(#frame)">

    <!-- 1 · fondo esquina sup-izq · -10° · b&w subexpuesta -->
    <g transform="rotate(-10, 20, 24)" filter="url(#ps)">
      <rect x="11" y="18" width="18" height="13" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="14" y="20" width="12" height="9" fill="#1a1917" opacity="0.84"/>
    </g>

    <!-- 2 · fondo top-centro · +8° · sepia (proceso analógico) -->
    <g transform="rotate(8, 50, 18)" filter="url(#ps)">
      <rect x="40" y="11" width="20" height="14" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="43" y="13" width="14" height="10" fill="#7a5230" opacity="0.65"/>
    </g>

    <!-- 3 · fondo esquina sup-der · -6° · b&w sobreexpuesta -->
    <g transform="rotate(-6, 76, 26)" filter="url(#ps)">
      <rect x="67" y="20" width="18" height="13" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="70" y="22" width="12" height="9" fill="#1a1917" opacity="0.22"/>
    </g>

    <!-- 4 · fondo bottom-izq · +11° · cianotipia -->
    <g transform="rotate(11, 22, 47)" filter="url(#ps)">
      <rect x="12" y="40" width="20" height="15" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="15" y="42" width="14" height="11" fill="#1e4a6e" opacity="0.62"/>
    </g>

    <!-- 5 · fondo bottom-der · +4° · ámbar cálido -->
    <g transform="rotate(4, 71, 44)" filter="url(#ps)">
      <rect x="61" y="37" width="20" height="15" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="64" y="39" width="14" height="11" fill="#8a5a20" opacity="0.60"/>
    </g>

    <!-- 6 · capa media izq · +5° · b&w media -->
    <g transform="rotate(5, 37, 35)" filter="url(#ps)">
      <rect x="26" y="27" width="22" height="16" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="29" y="29" width="16" height="12" fill="#1a1917" opacity="0.66"/>
    </g>

    <!-- 7 · capa media der · -3° · b&w oscura -->
    <g transform="rotate(-3, 62, 33)" filter="url(#ps)">
      <rect x="51" y="25" width="22" height="16" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="54" y="27" width="16" height="12" fill="#1a1917" opacity="0.78"/>
    </g>

    <!-- 8 · frente hero · +1° · b&w bien expuesta -->
    <g transform="rotate(1, 48, 37)" filter="url(#ps)">
      <rect x="35" y="28" width="26" height="19" rx="0.5"
            fill="#ffffff" stroke="#a8a5a0" stroke-width="0.7"/>
      <rect x="38" y="30" width="20" height="15" fill="#1a1917" opacity="0.56"/>
    </g>

  </g>

</svg>
