<svg viewBox="0 0 96 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    photoshelf v5b r4
    9 copias · hero bajado · + retrato de personas
  -->

  <!-- Film body -->
  <rect width="96" height="68" rx="5" fill="#1a1917"/>

  <!-- Top sprockets (6) -->
  <rect x="7"  y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="3" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Bottom sprockets (6) -->
  <rect x="7"  y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="22" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="37" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="52" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="67" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>
  <rect x="82" y="60" width="7" height="5" rx="1.5" fill="#f8f7f5"/>

  <!-- Image frame (base crema) -->
  <rect x="7" y="11" width="82" height="46" fill="#f8f7f5"/>

  <defs>
    <clipPath id="frame">
      <rect x="7" y="11" width="82" height="46"/>
    </clipPath>
    <filter id="ps" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0.5" dy="0.8" stdDeviation="1.0"
                    flood-color="#1a1917" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g clip-path="url(#frame)">

    <!-- 1 · fondo esquina sup-izq · -18° · paisaje con sol -->
    <g transform="rotate(-18, 18, 23)" filter="url(#ps)">
      <rect x="9" y="16" width="18" height="13" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="12" y="18" width="12" height="5" fill="#87b4d4"/>
      <rect x="12" y="23" width="12" height="4" fill="#5a7a40"/>
      <circle cx="19" cy="20" r="1.5" fill="#f0c030"/>
    </g>

    <!-- 2 · fondo top-centro · +14° · atardecer sepia -->
    <g transform="rotate(14, 50, 18)" filter="url(#ps)">
      <rect x="40" y="11" width="20" height="14" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="43" y="13" width="14" height="5" fill="#c49050"/>
      <rect x="43" y="18" width="14" height="5" fill="#7a5030"/>
      <circle cx="50" cy="15.5" r="2" fill="#e8a020"/>
    </g>

    <!-- 3 · fondo esquina sup-der · -22° · niebla -->
    <g transform="rotate(-22, 80, 22)" filter="url(#ps)">
      <rect x="71" y="15" width="18" height="13" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="74" y="17" width="12" height="6" fill="#c8d8e8"/>
      <rect x="74" y="23" width="12" height="3" fill="#a8a090"/>
      <rect x="75" y="18" width="5" height="2" rx="1" fill="#f0eee8"/>
    </g>

    <!-- 4 · fondo bottom-izq · +20° · cianotipia ciudad -->
    <g transform="rotate(20, 15, 50)" filter="url(#ps)">
      <rect x="5" y="42" width="20" height="15" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="8" y="44" width="14" height="11" fill="#4a7aaa"/>
      <rect x="10" y="46" width="3" height="9"  fill="#1e3858"/>
      <rect x="15" y="48" width="4" height="7"  fill="#1e3858"/>
      <rect x="20" y="47" width="2" height="8"  fill="#1e3858"/>
    </g>

    <!-- 5 · fondo bottom-der · -14° · bosque ámbar -->
    <g transform="rotate(-14, 75, 49)" filter="url(#ps)">
      <rect x="65" y="41" width="20" height="15" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="68" y="43" width="14" height="5"  fill="#e8a830"/>
      <rect x="68" y="48" width="14" height="6"  fill="#4a6820"/>
      <polygon points="72,48 69,54 75,54" fill="#2a4a18"/>
      <polygon points="77,48 74,54 80,54" fill="#2a4a18"/>
    </g>

    <!-- 6 · capa media izq · +12° · mar y horizonte -->
    <g transform="rotate(12, 34, 36)" filter="url(#ps)">
      <rect x="23" y="28" width="22" height="16" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="26" y="30" width="16" height="5" fill="#9ac8e0"/>
      <rect x="26" y="35" width="16" height="7" fill="#3a6a9a"/>
      <circle cx="36" cy="32" r="1.5" fill="#f0c040"/>
    </g>

    <!-- 7 · retrato de personas · -12° · dos siluetas -->
    <!-- outer: x=50,y=16,w=20,h=14 · inner: x=53,y=18,w=14,h=10 -->
    <g transform="rotate(-12, 60, 23)" filter="url(#ps)">
      <rect x="50" y="16" width="20" height="14" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <!-- cielo cálido -->
      <rect x="53" y="18" width="14" height="7" fill="#e8c090"/>
      <!-- tierra -->
      <rect x="53" y="25" width="14" height="3" fill="#c07040"/>
      <!-- persona 1 — izq -->
      <circle cx="57" cy="21"   r="2"   fill="#2a1508"/>
      <rect   x="55" y="23" width="4" height="5" rx="0.5" fill="#2a1508"/>
      <!-- persona 2 — der, ligeramente más alta -->
      <circle cx="63" cy="20.5" r="2"   fill="#2a1508"/>
      <rect   x="61" y="22.5" width="4" height="5.5" rx="0.5" fill="#2a1508"/>
    </g>

    <!-- 8 · montañas · -8° · picos contra cielo frío -->
    <g transform="rotate(-8, 61, 33)" filter="url(#ps)">
      <rect x="50" y="25" width="22" height="16" rx="0.5"
            fill="#ffffff" stroke="#c0bdb8" stroke-width="0.5"/>
      <rect x="53" y="27" width="16" height="5" fill="#b8c8d8"/>
      <polygon points="53,39 58,30 63,39" fill="#5a5055"/>
      <polygon points="59,39 64,29 69,39" fill="#6a6068"/>
    </g>

    <!-- 9 · hero · +3° · paisaje completo · bajado para rellenar el frame -->
    <!-- outer: x=34,y=31,w=26,h=19 · inner: x=37,y=33,w=20,h=15 -->
    <g transform="rotate(3, 47, 41)" filter="url(#ps)">
      <rect x="34" y="31" width="26" height="19" rx="0.5"
            fill="#ffffff" stroke="#a8a5a0" stroke-width="0.7"/>
      <rect x="37" y="33" width="20" height="7"  fill="#6aa8d0"/>
      <rect x="37" y="40" width="20" height="8"  fill="#5a8035"/>
      <circle cx="52" cy="36"   r="2.5" fill="#f5b820"/>
      <rect x="38" y="34" width="6" height="2" rx="1" fill="#e8f0f8" opacity="0.75"/>
    </g>

  </g>

</svg>
